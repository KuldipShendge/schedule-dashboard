<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Dashboard — May 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a;
    --card:rgba(16,16,24,0.82);
    --card-solid:#10101a;
    --border:rgba(255,255,255,0.10);
    --border-hover:rgba(0,229,255,0.35);
    --accent:#00e5ff;
    --accent-dim:rgba(0,229,255,0.12);
    --gold:#c9a84c; --gold-light:#e8c97a; --gold-dim:rgba(201,168,76,0.15);
    --text:#e4e4f0; --muted:rgba(200,200,225,0.88);
    --success:#4caf87; --danger:#e05a5a; --danger-dim:rgba(224,90,90,0.12);
    --cat-learn:#4c7fc9; --cat-learn-dim:rgba(76,127,201,0.14);
    --cat-hr:#9b4cc9;    --cat-hr-dim:rgba(155,76,201,0.14);
    --cat-hands:#4cc9a8; --cat-hands-dim:rgba(76,201,168,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:#0a0a0a !important;
    font-family:'Aptos','Aptos Display','Segoe UI',Calibri,'Helvetica Neue',Arial,sans-serif;
    color:var(--text);min-height:100vh;overflow-x:hidden;font-size:16px;
  }
  /* Particle canvas sits behind everything */
  #particles-js{
    position:fixed;inset:0;width:100%;height:100%;
    z-index:0;pointer-events:none;
  }
  .container{max-width:1060px;margin:0 auto;padding:40px 20px;position:relative;z-index:1;}

  /* ── Header ── */
  header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:40px;gap:20px;flex-wrap:wrap;}
  .header-left h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,44px);font-weight:700;letter-spacing:-.5px;line-height:1.1;color:#fff;}
  .header-left h1 span{color:var(--accent);}
  .header-left p{font-size:15px;color:var(--muted);margin-top:7px;font-family:'DM Mono',monospace;letter-spacing:.3px;}
  .stats-row{display:flex;gap:12px;flex-wrap:wrap;}
  .stat-pill{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 18px;text-align:center;min-width:66px;backdrop-filter:blur(8px);}
  .stat-pill .num{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);line-height:1;font-weight:700;}
  .stat-pill .label{font-size:13px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1.1px;font-weight:500;}

  /* ── Session legend ── */
  .session-legend{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
  .sl-item{display:flex;align-items:center;gap:7px;font-size:15px;color:var(--muted);}
  .sl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .sl-dot.learn {background:var(--cat-learn);}
  .sl-dot.hr    {background:var(--cat-hr);}
  .sl-dot.hands {background:var(--cat-hands);}

  /* ── Status legend ── */
  .legend{display:flex;gap:18px;margin-bottom:20px;flex-wrap:wrap;font-size:15px;color:var(--muted);align-items:center;}
  .legend-item{display:flex;align-items:center;gap:7px;}
  .legend-dot{width:19px;height:19px;border-radius:5px;display:grid;place-items:center;flex-shrink:0;}
  .legend-dot.done{background:var(--success);}
  .legend-dot.miss{background:var(--danger-dim);border:1.5px solid var(--danger);}
  .legend-dot.open{border:1.5px solid var(--border);}

  /* ── Progress ── */
  .global-progress{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px 22px;margin-bottom:30px;display:flex;align-items:center;gap:18px;backdrop-filter:blur(8px);}
  .prog-label{font-size:14px;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:1px;font-weight:500;}
  .prog-bar-wrap{flex:1;height:7px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}
  .prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .prog-pct{font-family:'DM Mono',monospace;font-size:15px;color:var(--gold);white-space:nowrap;min-width:44px;text-align:right;font-weight:500;}

  /* ── Week tabs ── */
  .week-tabs{display:flex;gap:8px;margin-bottom:26px;flex-wrap:wrap;}
  .week-tab{padding:8px 20px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:15px;cursor:pointer;transition:all .2s;font-weight:500;}
  .week-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  .week-tab:hover:not(.active){border-color:rgba(255,255,255,0.3);color:var(--text);}

  /* ── Week section ── */
  .week-section{display:none;}
  .week-section.active{display:block;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .week-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--text);font-weight:600;}
  .week-badge{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(0,229,255,0.25);padding:5px 13px;border-radius:99px;letter-spacing:.8px;text-transform:uppercase;font-weight:500;}

  /* ── Days grid ── */
  .days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px;}
  .day-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s;backdrop-filter:blur(10px);}
  .day-card:hover{border-color:var(--border-hover);box-shadow:0 4px 28px rgba(0,229,255,0.08);}
  .day-card.today{border-color:var(--accent);box-shadow:0 0 0 1px rgba(0,229,255,0.15),0 4px 28px rgba(0,229,255,0.10);}
  .day-head{padding:13px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .day-name{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-family:'DM Mono',monospace;}
  .day-date{font-family:'Playfair Display',serif;font-size:23px;color:var(--text);font-weight:600;margin-top:2px;}
  .day-card.today .day-date{color:var(--accent);}
  .today-badge{font-size:11px;background:var(--accent);color:#0a0a0a;padding:3px 10px;border-radius:99px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .day-progress{height:3px;background:rgba(255,255,255,0.06);}
  .day-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .4s ease;}

  /* ── Session group header ── */
  .session-group{padding:9px 12px 2px;}
  .session-group-label{
    font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;
    display:flex;align-items:center;gap:6px;padding:0 4px;
  }
  .session-group-label .sg-bar{width:3px;height:12px;border-radius:2px;flex-shrink:0;}
  .session-group.learn .session-group-label{color:var(--cat-learn);}
  .session-group.learn .sg-bar{background:var(--cat-learn);}
  .session-group.hr    .session-group-label{color:var(--cat-hr);}
  .session-group.hr    .sg-bar{background:var(--cat-hr);}
  .session-group.hands .session-group-label{color:var(--cat-hands);}
  .session-group.hands .sg-bar{background:var(--cat-hands);}

  /* ── Slot ── */
  .slot-wrap{border-radius:9px;overflow:visible;margin:2px 8px;}
  .slot{display:flex;align-items:center;gap:10px;padding:9px 8px;cursor:pointer;transition:background .15s;user-select:none;border-radius:9px;}
  .slot:hover{background:rgba(255,255,255,.05);}
  .slot.missed{background:var(--danger-dim);}
  .slot.missed:hover{background:rgba(224,90,90,.18);}

  /* colour accent on left for session type */
  .slot-wrap.learn .slot{ border-left:2.5px solid rgba(76,127,201,0.5); padding-left:7px; }
  .slot-wrap.hr    .slot{ border-left:2.5px solid rgba(155,76,201,0.5); padding-left:7px; }
  .slot-wrap.hands .slot{ border-left:2.5px solid rgba(76,201,168,0.5); padding-left:7px; }

  input[type="checkbox"]{display:none;}
  .slot-icon{width:19px;height:19px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.2);flex-shrink:0;display:grid;place-items:center;transition:all .2s;background:transparent;}
  .slot-icon svg{opacity:0;transform:scale(.4);transition:all .2s;}
  .slot.checked .slot-icon{background:var(--success);border-color:var(--success);}
  .slot.checked .slot-icon .tick{opacity:1;transform:scale(1);}
  .slot.missed  .slot-icon{border-color:var(--danger);}
  .slot.missed  .slot-icon .cross{opacity:1;transform:scale(1);}

  .slot-time{font-size:16px;color:var(--text);transition:color .2s;flex:1;font-weight:500;letter-spacing:.1px;}
  .slot.checked .slot-time{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(180,180,210,.3);}
  .slot.missed  .slot-time{color:var(--danger);opacity:.85;}
  .slot-num{font-family:'DM Mono',monospace;font-size:12px;color:rgba(200,200,225,0.45);width:14px;text-align:right;flex-shrink:0;}

  /* midnight badge */
  .midnight-badge{
    font-size:11px;font-weight:600;color:#f0a050;background:rgba(240,160,80,.16);
    border:1px solid rgba(240,160,80,.4);border-radius:4px;
    padding:1px 5px;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;
  }

  /* ── Reason box ── */
  .reason-box{display:none;padding:0 8px 10px 37px;animation:reasonIn .25s ease;}
  @keyframes reasonIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .reason-box.visible{display:block;}
  .reason-label{font-size:12px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
  .reason-label::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--danger);flex-shrink:0;}
  .reason-textarea{
    width:100%;background:rgba(224,90,90,.07);border:1px solid rgba(224,90,90,.3);
    border-radius:8px;color:var(--text);
    font-family:'Aptos','Segoe UI',Calibri,Arial,sans-serif;
    font-size:14px;line-height:1.5;padding:7px 10px;resize:none;min-height:50px;
    transition:border-color .2s,background .2s;outline:none;
  }
  .reason-textarea::placeholder{color:rgba(224,90,90,.4);font-style:italic;}
  .reason-textarea:focus{border-color:rgba(224,90,90,.7);background:rgba(224,90,90,.11);}
  .reason-char{font-size:12px;color:rgba(224,90,90,.6);text-align:right;margin-top:3px;font-family:'DM Mono',monospace;}

  /* ── Footer ── */
  footer{margin-top:46px;padding-top:22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  footer p{font-size:14px;color:var(--muted);font-family:'DM Mono',monospace;}
  .reset-btn{font-family:inherit;font-size:14px;padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-weight:500;}
  .reset-btn:hover{border-color:var(--danger);color:var(--danger);}

  @media(max-width:620px){.days-grid{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div id="particles-js"></div>
<div class="container">

  <header>
    <div class="header-left">
      <h1>May <span>2026</span> Schedule</h1>
      <p>01 May 2026 → 28 May 2026 &nbsp;·&nbsp; 6 slots/day &nbsp;·&nbsp; End time +15 min/week</p>
    </div>
    <div class="stats-row">
      <div class="stat-pill"><div class="num">28</div><div class="label">Days</div></div>
      <div class="stat-pill"><div class="num" id="stat-done">0</div><div class="label">Done</div></div>
      <div class="stat-pill"><div class="num" id="stat-missed">0</div><div class="label">Missed</div></div>
      <div class="stat-pill"><div class="num">168</div><div class="label">Slots</div></div>
    </div>
  </header>

  <!-- Session colour legend -->
  <div class="session-legend">
    <div class="sl-item"><div class="sl-dot learn"></div><span>Learning Session's</span></div>
    <div class="sl-item"><div class="sl-dot hr"></div><span>Hands-on &amp; Reading Session's</span></div>
    <div class="sl-item"><div class="sl-dot hands"></div><span>Hands-on Session's</span></div>
  </div>

  <!-- Status legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot done">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div><span>Completed</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot miss">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="#e05a5a" stroke-width="1.9" stroke-linecap="round"/></svg>
      </div><span>Missed — reason box opens</span>
    </div>
    <div class="legend-item"><div class="legend-dot open"></div><span>Upcoming</span></div>
  </div>

  <div class="global-progress">
    <span class="prog-label">Overall Progress</span>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="global-fill" style="width:0%"></div></div>
    <span class="prog-pct" id="global-pct">0%</span>
  </div>

  <div class="week-tabs" id="week-tabs"></div>
  <div id="weeks-container"></div>

  <footer>
    <p>Auto-saved · Last update: <span id="last-save">—</span></p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="reset-btn" id="copy-link-btn" onclick="copyLink()" title="Copy this URL and paste in any browser to load your progress">📋 Copy Link</button>
      <button class="reset-btn" onclick="resetAll()">Reset All</button>
    </div>
  </footer>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIGURATION — edit here
// ─────────────────────────────────────────────
const START = new Date(2026, 4, 4);   // May 1 2026  (month is 0-based)
const DAYS  = 28;

// [startHour, startMin, endHour, endMin]
// For midnight-crossing slots (e.g. 10pm→1am) end hour < start hour — handled automatically
const BASE_SLOTS = [
  [10,  0, 10, 30],   // Learning 1
  [12,  0, 12, 30],   // Learning 2
  [14, 45, 15, 15],   // Hands-on & Reading 1
  [16, 45, 17, 15],   // Hands-on & Reading 2
  [19, 30, 20,  0],   // Hands-on 1
  [22,  0, 23,  0],   // Hands-on 2  (crosses midnight → ends next day)
];

// Which slot indices belong to each session group
const GROUPS = [
  { key:'learn', label:"Learning Session's",           indices:[0,1] },
  { key:'hr',    label:"Hands-on & Reading Session's", indices:[2,3] },
  { key:'hands', label:"Hands-on Session's",           indices:[4,5] },
];

// Build a quick index lookup: slotIndex → group key
const SLOT_GROUP = {};
GROUPS.forEach(g => g.indices.forEach(i => SLOT_GROUP[i] = g.key));

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
const DAY_NAMES   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FULL_DAY    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_SH   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function fmt(h, m) {
  const ap = h < 12 ? 'am' : 'pm';
  const hh = h % 12 === 0 ? 12 : h % 12;
  const mm = m === 0 ? '' : ':' + String(m).padStart(2,'0');
  return `${hh}${mm}${ap}`;
}

// Add `mins` to the end-time portion of a slot; keeps start untouched
function addMinsToEnd([sh, sm, eh, em], mins) {
  const crossesMidnight = (eh * 60 + em) < (sh * 60 + sm);
  let endTotal = eh * 60 + em + mins;
  // keep in 0-1439 range
  endTotal = ((endTotal % 1440) + 1440) % 1440;
  return [sh, sm, Math.floor(endTotal / 60), endTotal % 60];
}

function slotsForWeek(w) {
  return BASE_SLOTS.map(s => addMinsToEnd(s, w * 15));
}

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ★ KEY FIX: if end-time (hour:min) < start-time it crosses midnight → add 1 day
function slotEndMs(date, sh, sm, eh, em) {
  const d = new Date(date);
  d.setHours(eh, em, 0, 0);
  if (eh * 60 + em < sh * 60 + sm) {   // midnight-crossing slot
    d.setDate(d.getDate() + 1);
  }
  return d.getTime();
}

// ─────────────────────────────────────────────
//  STATE  (URL hash  ←→  localStorage fallback)
//
//  WHY: localStorage is browser-specific.
//  Ticking a slot in Chrome won't appear in Edge
//  because each browser has its own isolated storage.
//  Fix: encode checkbox state as base64 in the URL
//  hash so the link itself carries the data.
//  Copy the URL → paste in Edge → same state loads.
// ─────────────────────────────────────────────

// ── Encode all 168 slots (28d × 6) into a short base64 string ──
function encodeState() {
  const bits = [];
  for (let w = 0; w < 4; w++) {
    for (let d = 0; d < 7; d++) {
      const dt = new Date(START); dt.setDate(START.getDate() + w*7 + d);
      const dk = dateStr(dt);
      for (let i = 0; i < BASE_SLOTS.length; i++) {
        bits.push(isChecked(dk, i) ? 1 : 0);
      }
    }
  }
  // pack bits → bytes → base64
  const bytes = [];
  for (let i = 0; i < bits.length; i += 8) {
    let b = 0;
    for (let j = 0; j < 8; j++) b |= ((bits[i+j]||0) << (7-j));
    bytes.push(b);
  }
  return btoa(String.fromCharCode(...bytes));
}

// ── Decode base64 hash back into state object ──
function decodeHash(encoded) {
  try {
    const bin  = atob(encoded);
    const bits = [];
    for (let i = 0; i < bin.length; i++) {
      const byte = bin.charCodeAt(i);
      for (let b = 7; b >= 0; b--) bits.push((byte >> b) & 1);
    }
    const s = {};
    let idx = 0;
    for (let w = 0; w < 4; w++) {
      for (let d = 0; d < 7; d++) {
        const dt = new Date(START); dt.setDate(START.getDate() + w*7 + d);
        const dk = dateStr(dt);
        for (let i = 0; i < BASE_SLOTS.length; i++) {
          if (bits[idx++]) { if (!s[dk]) s[dk]={}; s[dk][i]=true; }
        }
      }
    }
    return s;
  } catch(e) { return null; }
}

// ── Load: URL hash first, then localStorage fallback ──
let state = {};
const _hashRaw = window.location.hash.slice(1); // strip leading #
if (_hashRaw) {
  const decoded = decodeHash(_hashRaw);
  if (decoded) state = decoded;
} else {
  try { state = JSON.parse(localStorage.getItem('may2026') || '{}'); } catch(e) {}
}

// ── Save: update BOTH localStorage AND the URL hash ──
function save() {
  const encoded = encodeState();
  // Update URL hash without reloading the page
  history.replaceState(null, '', '#' + encoded);
  // Also save to localStorage as backup for this browser
  localStorage.setItem('may2026', JSON.stringify(state));
  document.getElementById('last-save').textContent = new Date().toLocaleTimeString();
}

function isChecked(dk, i) { return !!(state[dk] && state[dk][i]); }

function getReasons() { let r={}; try{ r=JSON.parse(localStorage.getItem('may2026_reasons')||'{}'); }catch(e){} return r; }
function saveReason(dk, i, text) {
  const r = getReasons(); if(!r[dk]) r[dk]={};
  r[dk][i] = text;
  localStorage.setItem('may2026_reasons', JSON.stringify(r));
}
function getReason(dk, i) { const r=getReasons(); return r[dk]&&r[dk][i] ? r[dk][i] : ''; }

function toggle(dk, i) {
  if(!state[dk]) state[dk] = {};
  state[dk][i] = !isChecked(dk, i);
  save(); updateAll();
}

// ─────────────────────────────────────────────
//  BUILD UI
// ─────────────────────────────────────────────
const now    = new Date();
const today  = new Date(now); today.setHours(0,0,0,0);
const tabsEl = document.getElementById('week-tabs');
const weeksEl= document.getElementById('weeks-container');

for (let w = 0; w < 4; w++) {
  const wStart = new Date(START); wStart.setDate(START.getDate() + w*7);
  const wEnd   = new Date(wStart); wEnd.setDate(wStart.getDate() + 6);

  // Tab
  const tab = document.createElement('button');
  tab.className = 'week-tab' + (w===0?' active':'');
  tab.textContent = `Week ${w+1}`;
  tab.dataset.week = w;
  tab.onclick = () => showWeek(w);
  tabsEl.appendChild(tab);

  // Section wrapper
  const section = document.createElement('div');
  section.className = 'week-section' + (w===0?' active':'');
  section.id = `week-${w}`;
  section.innerHTML = `
    <div class="week-header">
      <div class="week-title">${FULL_DAY[wStart.getDay()]} ${wStart.getDate()} — ${FULL_DAY[wEnd.getDay()]} ${wEnd.getDate()} ${MONTHS_FULL[wEnd.getMonth()]}</div>
      <span class="week-badge">+${w*15} min end time</span>
    </div>
    <div class="days-grid" id="days-${w}"></div>`;
  weeksEl.appendChild(section);

  const grid = section.querySelector(`#days-${w}`);
  const slots = slotsForWeek(w);

  for (let d = 0; d < 7; d++) {
    const date    = new Date(wStart); date.setDate(wStart.getDate() + d);
    const dk      = dateStr(date);
    const isToday = date.getTime() === today.getTime();

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday?' today':'');
    card.id = `card-${dk}`;
    card.innerHTML = `
      <div class="day-head">
        <div>
          <div class="day-name">${DAY_NAMES[date.getDay()]}</div>
          <div class="day-date">${date.getDate()} ${MONTHS_SH[date.getMonth()]}</div>
        </div>
        ${isToday?'<span class="today-badge">Today</span>':''}
      </div>
      <div class="day-progress"><div class="day-progress-fill" id="dp-${dk}" style="width:0%"></div></div>
      <div class="slots-body" id="slots-${dk}"></div>`;

    const slotsBody = card.querySelector(`#slots-${dk}`);

    // ── Render groups with headers ──
    GROUPS.forEach(group => {
      // Group header
      const grpDiv = document.createElement('div');
      grpDiv.className = `session-group ${group.key}`;
      grpDiv.innerHTML = `<div class="session-group-label"><span class="sg-bar"></span>${group.label}</div>`;
      slotsBody.appendChild(grpDiv);

      // Slots within this group
      group.indices.forEach(i => {
        const [sh, sm, eh, em] = slots[i];
        const checked    = isChecked(dk, i);
        const past       = now.getTime() > slotEndMs(date, sh, sm, eh, em);
        const missed     = past && !checked;
        const savedReason= getReason(dk, i);
        const midnight   = (eh*60+em) < (sh*60+sm); // crosses midnight?

        // Wrap
        const wrap = document.createElement('div');
        wrap.className = `slot-wrap ${group.key}`;
        wrap.id = `wrap-${dk}-${i}`;

        // Slot row
        const lbl = document.createElement('label');
        lbl.className = 'slot' + (checked?' checked':missed?' missed':'');
        lbl.id = `slot-${dk}-${i}`;
        lbl.innerHTML = `
          <input type="checkbox" ${checked?'checked':''}>
          <div class="slot-icon">
            <svg class="tick" width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="cross" width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="#e05a5a" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="slot-time">${fmt(sh,sm)} → ${fmt(eh,em)}</span>
          ${midnight?'<span class="midnight-badge">+1 day</span>':''}
          <span class="slot-num">${i+1}</span>`;

        // Set icon visibility
        const tick  = lbl.querySelector('.tick');
        const cross = lbl.querySelector('.cross');
        tick.style.cssText  = `opacity:${checked?1:0};transform:scale(${checked?1:.4})`;
        cross.style.cssText = `opacity:${missed ?1:0};transform:scale(${missed ?1:.4})`;

        lbl.addEventListener('click', e => { e.preventDefault(); toggle(dk, i); });

        // Reason box
        const reasonDiv = document.createElement('div');
        reasonDiv.className = 'reason-box' + (missed?' visible':'');
        reasonDiv.id = `reason-box-${dk}-${i}`;
        reasonDiv.innerHTML = `
          <div class="reason-label">Reason for missing</div>
          <textarea class="reason-textarea" id="reason-ta-${dk}-${i}"
            placeholder="Why was this slot missed? (e.g. work call, unwell, forgot…)"
            maxlength="200">${savedReason}</textarea>
          <div class="reason-char" id="reason-char-${dk}-${i}">${savedReason.length}/200</div>`;

        const ta     = reasonDiv.querySelector(`#reason-ta-${dk}-${i}`);
        const charEl = reasonDiv.querySelector(`#reason-char-${dk}-${i}`);
        ta.addEventListener('input', () => {
          charEl.textContent = ta.value.length + '/200';
          saveReason(dk, i, ta.value);
        });
        ta.addEventListener('click', e => e.stopPropagation());

        wrap.appendChild(lbl);
        wrap.appendChild(reasonDiv);
        grpDiv.appendChild(wrap);
      });
    });

    grid.appendChild(card);
  }
}

// ─────────────────────────────────────────────
//  SHOW WEEK
// ─────────────────────────────────────────────
function showWeek(w) {
  document.querySelectorAll('.week-tab').forEach(t => t.classList.toggle('active', +t.dataset.week===w));
  document.querySelectorAll('.week-section').forEach(s => s.classList.toggle('active', s.id===`week-${w}`));
}

// ─────────────────────────────────────────────
//  UPDATE ALL
// ─────────────────────────────────────────────
function updateAll() {
  const nowTs = new Date().getTime();
  let totalDone = 0, totalMissed = 0;
  const total = DAYS * BASE_SLOTS.length;

  for (let w = 0; w < 4; w++) {
    const slots = slotsForWeek(w);
    for (let d = 0; d < 7; d++) {
      const date = new Date(START); date.setDate(START.getDate() + w*7 + d);
      const dk = dateStr(date);
      let dayDone = 0;

      BASE_SLOTS.forEach(([bsh, bsm], i) => {
        const [sh, sm, eh, em] = slots[i];
        const checked = isChecked(dk, i);
        const past    = nowTs > slotEndMs(date, sh, sm, eh, em);
        const missed  = past && !checked;

        if (checked) dayDone++;
        if (missed)  totalMissed++;

        const lbl = document.getElementById(`slot-${dk}-${i}`);
        if (!lbl) return;
        lbl.className = 'slot' + (checked?' checked':missed?' missed':'');

        const tick  = lbl.querySelector('.tick');
        const cross = lbl.querySelector('.cross');
        tick.style.opacity  = checked ? 1 : 0;
        tick.style.transform= checked ? 'scale(1)' : 'scale(.4)';
        cross.style.opacity = missed  ? 1 : 0;
        cross.style.transform=missed  ? 'scale(1)' : 'scale(.4)';

        const rBox = document.getElementById(`reason-box-${dk}-${i}`);
        if (rBox) rBox.classList.toggle('visible', missed);
      });

      totalDone += dayDone;
      const dp = document.getElementById(`dp-${dk}`);
      if (dp) dp.style.width = (dayDone / BASE_SLOTS.length * 100) + '%';
    }
  }

  const pct = Math.round(totalDone / total * 100);
  document.getElementById('global-fill').style.width = pct + '%';
  document.getElementById('global-pct').textContent  = pct + '%';
  document.getElementById('stat-done').textContent   = totalDone;
  document.getElementById('stat-missed').textContent = totalMissed;
}

// ── Copy current URL (with hash) to clipboard ──
// Paste this URL in Edge / Firefox / any browser → same progress loads
function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-link-btn');
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    btn.style.borderColor = 'var(--success)';
    btn.style.color = 'var(--success)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2500);
  }).catch(() => {
    prompt('Copy this URL and open in any browser:', url);
  });
}

function resetAll() {
  if (!confirm('Reset all checkboxes and reasons? This cannot be undone.')) return;
  state = {};
  localStorage.removeItem('may2026_reasons');
  localStorage.removeItem('may2026');
  // Clear hash from URL
  history.replaceState(null, '', window.location.pathname);
  document.querySelectorAll('.reason-textarea').forEach(ta => { ta.value=''; });
  document.querySelectorAll('.reason-char').forEach(el => { el.textContent='0/200'; });
  document.getElementById('last-save').textContent = '—';
  updateAll();
}

// ── Auto-jump to current week ──
for (let w = 0; w < 4; w++) {
  const wStart = new Date(START); wStart.setDate(START.getDate() + w*7);
  const wEnd   = new Date(wStart); wEnd.setDate(wStart.getDate() + 6);
  if (today >= wStart && today <= wEnd) { showWeek(w); break; }
}
updateAll();
setInterval(updateAll, 60000);
</script>
